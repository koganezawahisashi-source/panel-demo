<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BT817 Panel Simulator — 800x480</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 20px;
  }
  #info {
    color: #666;
    font-size: 12px;
    margin-bottom: 8px;
    letter-spacing: .08em;
  }
  canvas {
    display: block;
    border: 2px solid #243044;
    cursor: pointer;
    max-width: 100%;
  }
  #touch-hint {
    color: #4A5A7A;
    font-size: 11px;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div id="info">BT817 Panel Simulator &nbsp;|&nbsp; 800 × 480 &nbsp;|&nbsp; Click buttons to interact</div>
<canvas id="c" width="800" height="480"></canvas>
<div id="touch-hint">Left: MENU / ↑ / OK / ↓ &nbsp;|&nbsp; Right: context-dependent</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   定数
═══════════════════════════════════════════════ */
const W = 800, H = 480;
const BTN_W = 90, BTN_H = 90, BTN_GAP = 40;
const BTN_Y = [0, 130, 260, 390];
const CONT_X = BTN_W, CONT_W = W - 2 * BTN_W, RIGHT_X = W - BTN_W;
const HDR_H  = 80;   /* 44 → 56 → 80 */

/* フォントスケール（50cm視認距離対応） */
const FONT_SCALE = 1.7;

const C = {
  BG:     '#080C14', SURF:   '#0F1623', CARD:   '#172032',
  CARD2:  '#1E2A3D', BORDER: '#243044', ACCENT: '#4F8EF7',
  TEAL:   '#22D3EE', GREEN:  '#34D399', YELLOW: '#FBBF24',
  ORANGE: '#F97316', RED:    '#F87171', TXT:    '#E8EEF8',
  TXT2:   '#8B9BBF', TXT3:   '#4A5A7A', WHITE:  '#FFFFFF',
};

/* ═══════════════════════════════════════════════
   状態
═══════════════════════════════════════════════ */
const SCREEN  = { LOCK: 0, AUTH: 1, MAIN: 2 };
const PANEL   = { HOME: 0, OPERATION: 1, ALARM: 2, LOG: 3, SETTINGS: 4, USERS: 5 };
const ROLE    = { NONE: 0, OPERATOR: 1, ADMIN: 2 };
const MACHINE = { STOPPED: 0, RUNNING: 1 };

const state = {
  screen: SCREEN.LOCK, panel: PANEL.HOME, role: ROLE.NONE,
  userName: '', userRoleStr: '',
  machine: MACHINE.RUNNING,
  setRpm: 1200, actualRpm: 1200, feedIdx: 0,
  spindleLoad: 68, spindleTemp: 72, coolantTemp: 48, envTemp: 24,
  partsTotal: 1247, partsToday: 247, opSeconds: 30735,
  menuOpen: false, menuCursor: 0,
  authStart: 0, authPending: ROLE.NONE, authDuration: 1500,
  alarms: [
    { level: 'warn', title: 'Coolant Temp High',
      detail: 'Coolant temp exceeded 45C limit. Now 48C.',
      time: '2026-03-31 08:15', active: true, adminOnly: true },
    { level: 'info', title: 'Maintenance Due',
      detail: 'Spindle oil change due 2026-04-01.',
      time: '2026-03-31 10:00', active: true, adminOnly: false },
  ],
  alarmFilter: 'all', alarmCursor: 0,
  lockCursor: 0,
  logScroll: 0,
  settingsCursor: 0,
  settingsEditing: false,
  settingsChanged: false,
  settingsParams: { maxRpm: 3000, minRpm: 0, feedPattern: 0, toolNo: 1 },
  userCursor: 0,
  rtcH: 10, rtcM: 30, rtcS: 0, rtcLast: 0,
  toastMsg: '', toastTick: 0, toastVisible: false,
};

/* フィードパターン（Settings で切替） */
const FEED_PATTERNS = [
  [25, 50, 75, 100],   /* Pattern 1 */
  [50, 100],           /* Pattern 2 */
];
function getFeedVals() { return FEED_PATTERNS[state.settingsParams.feedPattern]; }

/* ユーザーデータ（状態変更可能なグローバル配列） */
const USER_DATA = [
  { name: 'Y.Yamada', role: 'Admin',    last: '2026-04-10 10:00', active: true  },
  { name: 'I.Tanaka', role: 'Operator', last: '2026-04-10 10:30', active: true  },
  { name: 'K.Suzuki', role: 'Operator', last: '2026-04-09 14:20', active: true  },
  { name: 'H.Sato',   role: 'Viewer',   last: '2026-03-28 09:00', active: false },
];

/* RPM値に応じた色（共通ルール: 赤=危険/注意のみ） */
function rpmColor(rpm) {
  return rpm >= 3000 ? C.ORANGE : rpm >= 1500 ? C.YELLOW : C.GREEN;
}

const LOG_DATA = [
  { time: '10:30:00', user: 'I.Tanaka', event: 'Login (Operator)' },
  { time: '10:28:15', user: 'Y.Yamada', event: 'Alarm reset: Coolant' },
  { time: '10:25:00', user: 'Y.Yamada', event: 'RPM changed: 1000\u21921200' },
  { time: '10:15:30', user: 'Y.Yamada', event: 'Feed rate changed: 50%\u219275%' },
  { time: '10:00:00', user: 'Y.Yamada', event: 'Login (Admin)' },
  { time: '09:55:10', user: 'I.Tanaka', event: 'Settings saved' },
  { time: '09:45:30', user: 'I.Tanaka', event: 'Machine stopped' },
  { time: '09:30:00', user: 'I.Tanaka', event: 'Alarm ack: Coolant High' },
  { time: '09:10:00', user: 'I.Tanaka', event: 'RPM changed: 1200\u21921000' },
  { time: '08:55:00', user: 'K.Suzuki', event: 'Login (Operator)' },
  { time: '08:32:00', user: 'I.Tanaka', event: 'Machine started' },
  { time: '08:30:00', user: 'I.Tanaka', event: 'Login (Operator)' },
  { time: '08:00:00', user: 'Y.Yamada', event: 'System startup' },
];

/* ═══════════════════════════════════════════════
   Canvas
═══════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

/* ═══════════════════════════════════════════════
   描画ヘルパー
═══════════════════════════════════════════════ */
function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}
function strokeRect(x, y, w, h, color, lw = 1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.strokeRect(x + .5, y + .5, w - 1, h - 1);
}
function hline(x, y, w, color, lw = 1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(x, y + .5); ctx.lineTo(x + w, y + .5); ctx.stroke();
}
function vline(x, y, h, color, lw = 1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(x + .5, y); ctx.lineTo(x + .5, y + h); ctx.stroke();
}

/* フォントスケールを適用 */
function text(x, y, str, color, size = 13, align = 'left', baseline = 'middle', bold = false) {
  ctx.fillStyle    = color;
  ctx.font         = `${bold ? '700' : '400'} ${Math.round(size * FONT_SCALE)}px "Segoe UI", Arial, sans-serif`;
  ctx.textAlign    = align;
  ctx.textBaseline = baseline;
  ctx.fillText(str, x, y);
}

function bar(x, y, w, h, pct, fg) {
  rect(x, y, w, h, C.BG);
  if (pct > 0) rect(x, y, Math.round(w * pct / 100), h, fg);
}
function card(x, y, w, h) {
  rect(x, y, w, h, C.CARD);
  strokeRect(x, y, w, h, C.BORDER);
}
function chip(x, y, label, color) {
  const tw = label.length * 9 + 18;
  ctx.fillStyle = color + '22'; ctx.fillRect(x, y, tw, 26);
  ctx.strokeStyle = color + '44'; ctx.lineWidth = 1;
  ctx.strokeRect(x + .5, y + .5, tw - 1, 25);
  text(x + tw / 2, y + 13, label, color, 11, 'center');
}

/* ═══════════════════════════════════════════════
   左固定ボタン
═══════════════════════════════════════════════ */
function drawLeftButtons() {
  for (let i = 0; i < 4; i++) {
    const y = BTN_Y[i];
    rect(0, y, BTN_W, BTN_H, C.SURF);
    hline(0, y + BTN_H - 1, BTN_W, C.BORDER);
    vline(BTN_W - 1, y, BTN_H, C.BORDER);
  }
  drawIconMenu(0, BTN_Y[0]);
  drawIconUp  (0, BTN_Y[1]);
  drawIconOk  (0, BTN_Y[2]);
  drawIconDown(0, BTN_Y[3]);
}
function drawIconMenu(bx, by) {
  ctx.strokeStyle = C.TXT2; ctx.lineWidth = 3;
  [30, 45, 60].forEach(dy => {
    ctx.beginPath(); ctx.moveTo(bx + 22, by + dy); ctx.lineTo(bx + 68, by + dy); ctx.stroke();
  });
}
function drawIconUp(bx, by) {
  ctx.strokeStyle = C.TXT2; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 45, by + 28); ctx.lineTo(bx + 22, by + 62);
  ctx.moveTo(bx + 45, by + 28); ctx.lineTo(bx + 68, by + 62);
  ctx.stroke();
}
function drawIconOk(bx, by) {
  ctx.strokeStyle = C.GREEN; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 22, by + 48); ctx.lineTo(bx + 38, by + 62); ctx.lineTo(bx + 68, by + 28);
  ctx.stroke();
}
function drawIconDown(bx, by) {
  ctx.strokeStyle = C.TXT2; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 22, by + 28); ctx.lineTo(bx + 45, by + 62);
  ctx.moveTo(bx + 68, by + 28); ctx.lineTo(bx + 45, by + 62);
  ctx.stroke();
}

/* ═══════════════════════════════════════════════
   右可変ボタン
═══════════════════════════════════════════════ */
function drawRightBtn(idx, label, bgColor, enabled = true, fontSize = 14) {
  const y  = BTN_Y[idx];
  const bg = enabled ? bgColor : C.SURF;
  const fc = enabled ? C.TXT   : C.TXT3;
  rect(RIGHT_X, y, BTN_W, BTN_H, bg);
  vline(RIGHT_X, y, BTN_H, C.BORDER);
  hline(RIGHT_X, y + BTN_H - 1, BTN_W, C.BORDER);
  if (label) text(RIGHT_X + BTN_W / 2, y + BTN_H / 2, label, fc, fontSize, 'center');
}

/* ═══════════════════════════════════════════════
   ヘッダバー
═══════════════════════════════════════════════ */
function renderHeader() {
  rect(CONT_X, 0, CONT_W, HDR_H, C.SURF);
  hline(CONT_X, HDR_H - 1, CONT_W, C.BORDER);

  text(CONT_X + 12, HDR_H / 2, 'NCS', C.ACCENT, 14, 'left', 'middle', true);
  vline(CONT_X + 76, 10, HDR_H - 20, C.BORDER);
  text(CONT_X + 86, HDR_H / 2, 'CNC-8100S', C.TXT, 13, 'left', 'middle', true);

  const stLabel = state.machine === MACHINE.RUNNING ? 'RUNNING' : 'STOPPED';
  const stCol   = state.machine === MACHINE.RUNNING ? C.GREEN   : C.RED;
  chip(CONT_X + 310, (HDR_H - 26) / 2, stLabel, stCol);

  const ts = `${p2(state.rtcH)}:${p2(state.rtcM)}:${p2(state.rtcS)}`;
  text(RIGHT_X - 8, 10, state.userName,    C.TXT,  13, 'right', 'top');
  text(RIGHT_X - 8, 36, state.userRoleStr, C.TXT2, 12, 'right', 'top');
  text(RIGHT_X - 8, 60, ts,               C.TXT2, 13, 'right', 'top');

  /* アクティブアラームバッジ */
  const activeCount = state.alarms.filter(a => a.active).length;
  if (activeCount > 0) {
    const bx = CONT_X + 310 + 120;
    const by = (HDR_H - 22) / 2;
    rect(bx, by, 54, 22, C.RED);
    text(bx + 27, by + 11, '\u26a0 ' + activeCount, C.WHITE, 11, 'center', 'middle', true);
  }
}

/* ═══════════════════════════════════════════════
   ロック画面
═══════════════════════════════════════════════ */
function renderLock(now) {
  rect(CONT_X, 0, CONT_W, H, C.BG);

  const cx = CONT_X + CONT_W / 2, cy = H / 2 - 40;

  /* RFIDリングアニメ */
  const t = now % 2400;
  [[0, 30], [600, 50], [1200, 70]].forEach(([delay, r]) => {
    let phase = (t + 2400 - delay) % 2400;
    let alpha = phase < 1200 ? (1 - phase / 1200) * 0.7 : 0;
    if (alpha < 0.01) return;
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.strokeStyle = C.ACCENT; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  });

  rect(cx - 28, cy - 28, 56, 56, C.CARD);
  strokeRect(cx - 28, cy - 28, 56, 56, C.BORDER);
  text(cx, cy, 'ID', C.ACCENT, 18, 'center', 'middle', true);

  text(cx, 52, 'NEXUS CONTROL SYSTEMS', C.TXT3, 13, 'center');
  text(cx, cy + 96, 'Present RFID card  —  or select role \u2192', C.TXT2, 13, 'center');

  const ts = `${p2(state.rtcH)}:${p2(state.rtcM)}:${p2(state.rtcS)}`;
  text(cx, H - 58, ts, C.TXT, 36, 'center', 'middle');
  text(cx, H - 20, '2026/04/10', C.TXT3, 13, 'center');

  drawRightBtn(0, 'OPR', state.lockCursor === 0 ? C.ACCENT : C.CARD, true);
  drawRightBtn(1, 'ADM', state.lockCursor === 1 ? C.ACCENT : C.CARD, true);
  drawRightBtn(2, '', C.SURF, false);
  drawRightBtn(3, '', C.SURF, false);
}

/* ═══════════════════════════════════════════════
   認証オーバーレイ
═══════════════════════════════════════════════ */
function renderAuth(now) {
  ctx.save(); ctx.globalAlpha = 0.75;
  rect(CONT_X, 0, CONT_W, H, C.BG);
  ctx.restore();

  const cx = CONT_X + CONT_W / 2, cy = H / 2;
  rect(cx - 150, cy - 90, 300, 180, C.CARD);
  strokeRect(cx - 150, cy - 90, 300, 180, C.BORDER);

  const angle = (now / 300) * Math.PI * 2;
  ctx.strokeStyle = C.BORDER; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(cx, cy - 20, 28, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = C.ACCENT; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(cx, cy - 20, 28, angle, angle + Math.PI * 1.2); ctx.stroke();

  text(cx, cy + 40, 'Authenticating...', C.TXT2, 14, 'center');
}

/* ═══════════════════════════════════════════════
   ホーム
═══════════════════════════════════════════════ */
function renderHome() {
  let y = HDR_H + 12;

  text(CONT_X + 8, y + 12, 'Dashboard', C.TXT, 17, 'left', 'top', true);
  y += 52;

  /* ステータスカード 4列 */
  const cw = Math.floor((CONT_W - 40) / 4);
  const ch = 88;
  ['MACHINE', 'SPINDLE RPM', 'PARTS', 'TEMPERATURE'].forEach((lb, i) => {
    card(CONT_X + 8 + i * (cw + 8), y, cw, ch);
    text(CONT_X + 8 + i * (cw + 8) + 8, y + 10, lb, C.TXT3, 10, 'left', 'top');
  });
  /* カード0: 状態 */
  { const sx = CONT_X + 8;
    const s  = state.machine === MACHINE.RUNNING ? 'RUNNING' : 'STOPPED';
    const cc = state.machine === MACHINE.RUNNING ? C.GREEN : C.RED;
    text(sx + 8, y + 36, s, cc, 14, 'left', 'top', true);
    text(sx + 8, y + 64, 'Today: 08:32:15', C.TXT2, 10, 'left', 'top'); }
  /* カード1: RPM */
  { const sx = CONT_X + 8 + (cw + 8);
    text(sx + 8, y + 32, state.actualRpm + '', C.TXT, 20, 'left', 'top');
    text(sx + 8, y + 64, 'Set: ' + state.setRpm, C.TXT2, 10, 'left', 'top'); }
  /* カード2: 加工数 */
  { const sx = CONT_X + 8 + 2 * (cw + 8);
    text(sx + 8, y + 32, state.partsTotal + '', C.TXT, 20, 'left', 'top');
    text(sx + 8, y + 64, 'Today: ' + state.partsToday, C.TXT2, 10, 'left', 'top'); }
  /* カード3: 温度 */
  { const sx = CONT_X + 8 + 3 * (cw + 8);
    text(sx + 8, y + 32, state.spindleTemp + '\u00b0C', C.YELLOW, 20, 'left', 'top');
    text(sx + 8, y + 64, '\u25b2 Rising', C.TXT2, 10, 'left', 'top'); }
  y += ch + 10;

  /* ゲージ2列 */
  const gw = Math.floor((CONT_W - 32) / 2), gh = 72;
  card(CONT_X + 8, y, gw, gh);
  text(CONT_X + 16, y + 10, 'SPINDLE LOAD', C.TXT3, 10, 'left', 'top');
  bar(CONT_X + 16, y + 32, gw - 32, 10, state.spindleLoad, C.ACCENT);
  text(CONT_X + 16 + (gw - 32) / 2, y + 54, state.spindleLoad + '%', C.TXT, 11, 'center');

  card(CONT_X + 8 + gw + 8, y, gw, gh);
  text(CONT_X + 8 + gw + 16, y + 10, 'COOLANT TEMP', C.TXT3, 10, 'left', 'top');
  bar(CONT_X + 8 + gw + 16, y + 32, gw - 32, 10, state.coolantTemp, C.TEAL);
  text(CONT_X + 8 + gw + 16 + (gw - 32) / 2, y + 54, state.coolantTemp + '\u00b0C', C.TXT, 11, 'center');
  y += gh + 10;

  /* 最近のアラーム */
  const ah = H - y - 8;
  card(CONT_X + 8, y, CONT_W - 16, ah);
  text(CONT_X + 16, y + 10, 'RECENT ALARMS', C.TXT, 12, 'left', 'top', true);
  state.alarms.slice(0, 2).forEach((al, i) => {
    const lc = al.level === 'error' ? C.RED : al.level === 'warn' ? C.YELLOW : C.ACCENT;
    const ay = y + 34 + i * 26;
    text(CONT_X + 16, ay, '\u25b6', lc, 11, 'left', 'top');
    text(CONT_X + 30, ay, al.title, C.TXT, 11, 'left', 'top');
    text(RIGHT_X - 8,  ay, al.time, C.TXT3, 10, 'right', 'top');
  });

  drawRightBtn(0, 'OPER', C.CARD);
  drawRightBtn(1, 'ALRM', C.CARD);
  drawRightBtn(2, 'LOG',  C.CARD);
  drawRightBtn(3, 'EXIT', C.RED);
}

/* ═══════════════════════════════════════════════
   運転操作
═══════════════════════════════════════════════ */
function renderOperation() {
  let y = HDR_H + 12;
  text(CONT_X + 8, y + 12, 'Operation', C.TXT, 17, 'left', 'top', true);
  y += 52;

  const lw = Math.floor(CONT_W * 0.55);
  const rw = CONT_W - lw - 24;
  const lh = H - y - 12;

  card(CONT_X + 8, y, lw, lh);

  const stStr = state.machine === MACHINE.RUNNING ? 'RUNNING' : 'STOPPED';
  const stCol = state.machine === MACHINE.RUNNING ? C.GREEN   : C.RED;
  text(CONT_X + 16, y + 12, 'MACHINE CONTROL', C.TXT3, 10, 'left', 'top');
  text(CONT_X + 16, y + 30, stStr, stCol, 16, 'left', 'top', true);

  /* RPM */
  text(CONT_X + 16, y + 64,  'SET: ' + state.setRpm + ' RPM',    C.TXT,  13, 'left', 'top', true);
  text(CONT_X + 16, y + 86,  'ACT: ' + state.actualRpm + ' RPM', C.TXT2, 11, 'left', 'top');
  const rpmMin = state.settingsParams.minRpm;
  const rpmMax = state.settingsParams.maxRpm;
  const rpmRange = rpmMax - rpmMin || 1;
  const rpmPct = Math.round(Math.max(0, state.setRpm - rpmMin) * 100 / rpmRange);
  bar(CONT_X + 16, y + 108, lw - 32, 10, rpmPct, rpmColor(state.setRpm));
  text(CONT_X + 16,                  y + 124, rpmMin + '',                       C.TXT3, 10, 'left',   'top');
  text(CONT_X + 16 + (lw - 32) / 2, y + 124, Math.round((rpmMin + rpmMax) / 2) + '', C.TXT3, 10, 'center', 'top');
  text(CONT_X + lw - 16,            y + 124, rpmMax + '',                       C.TXT3, 10, 'right',  'top');

  /* 送り速度 */
  const fv = getFeedVals();
  text(CONT_X + 16, y + 148, 'FEED RATE', C.TXT3, 10, 'left', 'top');
  fv.forEach((val, i) => {
    const fx     = CONT_X + 16 + i * 62;
    const sel    = state.feedIdx === i;
    const is100  = val === 100;
    const selCol = sel ? (is100 ? C.GREEN : C.ACCENT) : C.CARD2;
    rect(fx, y + 166, 56, 28, selCol);
    text(fx + 28, y + 180, val + '%', sel ? C.WHITE : C.TXT2, 12, 'center');
  });

  /* スピンドル負荷 */
  text(CONT_X + 16, y + 212, 'SPINDLE LOAD', C.TXT3, 10, 'left', 'top');
  bar(CONT_X + 16, y + 232, lw - 32, 14, state.spindleLoad, C.TEAL);
  text(CONT_X + 16 + (lw - 32) / 2, y + 264, state.spindleLoad + '%', C.TXT, 11, 'center');

  /* 右カード上：ステータス */
  const rx = CONT_X + 8 + lw + 8;
  const rh = Math.floor((lh - 8) / 2);
  card(rx, y, rw, rh);
  text(rx + 8, y + 10, 'CURRENT STATUS', C.TXT, 12, 'left', 'top', true);

  const opSec = state.opSeconds;
  [
    ['Status',       stStr,                          stCol],
    ['Actual RPM',   state.actualRpm + '',           rpmColor(state.actualRpm)],
    ['Spindle Load', state.spindleLoad + '%',        C.TXT],
    ['Feed Rate',    getFeedVals()[state.feedIdx] + '%',  getFeedVals()[state.feedIdx] === 100 ? C.GREEN : C.TXT],
    ['Parts Today',  state.partsToday + '',          C.TXT],
    ['Run Time',     `${p2(Math.floor(opSec/3600))}:${p2(Math.floor((opSec%3600)/60))}:${p2(opSec%60)}`, C.TXT],
  ].forEach(([k, v, vc], i) => {
    const ry = y + 32 + i * 22;
    text(rx + 8,      ry, k, C.TXT2, 10, 'left',  'top');
    text(rx + rw - 8, ry, v, vc,     10, 'right', 'top');
  });

  /* 右カード下：温度 */
  const ty = y + rh + 8;
  card(rx, ty, rw, rh);
  text(rx + 8, ty + 10, 'TEMPERATURE', C.TXT, 12, 'left', 'top', true);
  [['Spindle', state.spindleTemp], ['Coolant', state.coolantTemp], ['Ambient', state.envTemp]].forEach(([k, v], i) => {
    const ry = ty + 32 + i * 24;

  });

  if (state.machine === MACHINE.RUNNING) {

function renderAlarm() {
  let y = HDR_H + 12;
  text(CONT_X + 8, y + 12, 'Alarms', C.TXT, 17, 'left', 'top', true);
  y += 52;

  /* フィルタタブ */
  const tabs    = ['ALL', 'ERR', 'WARN', 'INFO'];
  const filters = ['all', 'error', 'warn', 'info'];
  tabs.forEach((t, i) => {
    const sel = state.alarmFilter === filters[i];
    rect(CONT_X + 8 + i * 74, y, 68, 30, sel ? C.ACCENT : C.CARD2);
    text(CONT_X + 8 + i * 74 + 34, y + 15, t, sel ? C.WHITE : C.TXT2, 12, 'center');
  });
  y += 38;

  let shown = 0;
  state.alarms.forEach((al, i) => {
    if (state.alarmFilter === 'error' && al.level !== 'error') return;
    if (state.alarmFilter === 'warn'  && al.level !== 'warn')  return;
    if (state.alarmFilter === 'info'  && al.level !== 'info')  return;
    const lc  = al.level === 'error' ? C.RED : al.level === 'warn' ? C.YELLOW : C.ACCENT;
    const ay  = y + shown * 102;
    const sel = state.alarmCursor === i;
    rect(CONT_X + 8, ay, CONT_W - 16, 96, sel ? '#0e2a45' : C.CARD);
    strokeRect(CONT_X + 8, ay, CONT_W - 16, 96, sel ? C.ACCENT : C.BORDER, sel ? 2 : 1);
    rect(CONT_X + 8, ay, 6, 96, sel ? lc : lc + '88');
    text(CONT_X + 20, ay + 10, al.title,  C.TXT,  13, 'left', 'top', true);
    text(CONT_X + 20, ay + 38, al.detail, C.TXT2, 11, 'left', 'top');
    text(CONT_X + 20, ay + 68, al.time,   C.TXT3, 11, 'left', 'top');
    text(RIGHT_X - 100, ay + 30, al.active ? 'ACTIVE' : 'RESET',
         al.active ? lc : C.TXT3, 12, 'left', 'top');
    shown++;
  });
  if (shown === 0) {
    text(CONT_X + CONT_W / 2, y + 50, 'No alarms', C.TXT3, 14, 'center');
  }

  const canReset = state.role === ROLE.ADMIN;
  drawRightBtn(0, 'DTL',  C.CARD);
  drawRightBtn(1, 'RST',  canReset ? C.YELLOW : C.SURF, canReset);
  drawRightBtn(2, 'FEED', C.CARD);
  drawRightBtn(3, '', C.SURF, false);
}

function render(now) {
  ctx.clearRect(0, 0, W, H);
  rect(0, 0, W, H, C.BG);
  drawLeftButtons();

  if (state.screen === SCREEN.LOCK) {
    renderLock(now);
  } else if (state.screen === SCREEN.AUTH) {
    renderLock(now);
    renderAuth(now);
  } else {
    rect(CONT_X, 0, CONT_W, H, C.BG);
    renderHeader();
    switch (state.panel) {
      case PANEL.HOME:      renderHome();      break;
      case PANEL.OPERATION: renderOperation(); break;
      case PANEL.ALARM:     renderAlarm();     break;
      case PANEL.LOG:       renderLog();       break;

    renderToast();

/* ═══════════════════════════════════════════════
   状態更新
═══════════════════════════════════════════════ */
function update(now) {
  if (now - state.rtcLast >= 1000) {
    state.rtcLast = now;
    state.rtcS++;
    if (state.rtcS >= 60) { state.rtcS = 0; state.rtcM++; }
    if (state.rtcM >= 60) { state.rtcM = 0; state.rtcH++; }
    if (state.rtcH >= 24) { state.rtcH = 0; }
    if (state.machine === MACHINE.RUNNING) state.opSeconds++;
  }
  if (state.screen === SCREEN.AUTH && now - state.authStart >= state.authDuration) {
    state.role        = state.authPending;
    state.userName    = state.role === ROLE.ADMIN ? 'Y.Yamada' : 'I.Tanaka';
    state.userRoleStr = state.role === ROLE.ADMIN ? 'Admin'    : 'Operator';
    state.screen      = SCREEN.MAIN;
    state.panel       = PANEL.HOME;
    state.menuOpen    = false;
  }
  if (state.toastVisible && now - state.toastTick >= 3000) {
    state.toastVisible = false;
  }
}

function showToast(msg, now) {
  state.toastMsg = msg; state.toastTick = now; state.toastVisible = true;
}

/* ═══════════════════════════════════════════════
   タッチ / クリック
═══════════════════════════════════════════════ */
function getTag(x, y) {
  if (x < BTN_W) {
    for (let i = 0; i < 4; i++) {
      if (y >= BTN_Y[i] && y < BTN_Y[i] + BTN_H) return i + 1;
    }
    return 0;
  }
  if (x >= RIGHT_X) {
    for (let i = 0; i < 4; i++) {
      if (y >= BTN_Y[i] && y < BTN_Y[i] + BTN_H) return 11 + i;
    }
    return 0;
  }
  if (state.screen === SCREEN.MAIN && state.menuOpen) {
    const mx = CONT_X + 20, my = 20, mw = 240;
    const menuItems = [
      { admin: false, tag: 21 }, { admin: false, tag: 22 },
      { admin: false, tag: 23 }, { admin: false, tag: 24 },
      { admin: true,  tag: 25 }, { admin: true,  tag: 26 },
    ];
    const visible = menuItems.filter(m => !m.admin || state.role === ROLE.ADMIN);
    if (x >= mx && x < mx + mw) {
      for (let i = 0; i < visible.length; i++) {
        const iy = my + 38 + i * MENU_ITEM_H;
        if (y >= iy && y < iy + MENU_ITEM_H - 4) return visible[i].tag;
      }
    }
  }
  return 0;
}

function handleTag(tag, now) {
  if (state.screen === SCREEN.AUTH) return;

  if (state.screen === SCREEN.LOCK) {
    if (tag === 2)  state.lockCursor = 0;
    if (tag === 4)  state.lockCursor = 1;
    if (tag === 3)  startAuth(state.lockCursor === 1 ? ROLE.ADMIN : ROLE.OPERATOR, now);
    if (tag === 11) { state.lockCursor = 0; startAuth(ROLE.OPERATOR, now); }
    if (tag === 12) { state.lockCursor = 1; startAuth(ROLE.ADMIN,    now); }
    return;
  }

  if (tag === 1) { state.menuOpen = !state.menuOpen; return; }

  if (state.menuOpen) {
    const cnt = state.role === ROLE.ADMIN ? 6 : 4;
    if (tag === 2) { state.menuCursor = (state.menuCursor - 1 + cnt) % cnt; }
    if (tag === 4) { state.menuCursor = (state.menuCursor + 1) % cnt; }
    if (tag === 3) {
      const panels = state.role === ROLE.ADMIN
        ? [PANEL.HOME, PANEL.OPERATION, PANEL.ALARM, PANEL.LOG, PANEL.SETTINGS, PANEL.USERS]
        : [PANEL.HOME, PANEL.OPERATION, PANEL.ALARM, PANEL.LOG];
      state.panel = panels[state.menuCursor];
      state.menuOpen = false;
    }
    const panelMap = { 21: PANEL.HOME, 22: PANEL.OPERATION, 23: PANEL.ALARM,
                       24: PANEL.LOG,  25: PANEL.SETTINGS,  26: PANEL.USERS };
    if (panelMap[tag] !== undefined) {
      if ((tag === 25 || tag === 26) && state.role !== ROLE.ADMIN) return;
      state.panel = panelMap[tag]; state.menuOpen = false;
    }
    return;
  }

  switch (state.panel) {
    case PANEL.HOME:
      if (tag === 11) state.panel = PANEL.OPERATION;
      if (tag === 12) state.panel = PANEL.ALARM;
      if (tag === 13) state.panel = PANEL.LOG;
      if (tag === 14) {
        state.screen = SCREEN.LOCK; state.role = ROLE.NONE;
        state.userName = ''; state.userRoleStr = ''; state.lockCursor = 0;
      }
      break;
    case PANEL.OPERATION:
      if (tag === 11) {
        state.machine = state.machine === MACHINE.RUNNING ? MACHINE.STOPPED : MACHINE.RUNNING;
        showToast(state.machine === MACHINE.RUNNING ? 'Machine started' : 'Machine stopped', now);
      }
      if (tag === 12 || tag === 2) {
        const maxR = state.settingsParams.maxRpm;
        if (state.setRpm < maxR) { state.setRpm = Math.min(maxR, state.setRpm + 100); state.actualRpm = state.setRpm; }
      }
      if (tag === 13 || tag === 4) {
        const minR = state.settingsParams.minRpm;
        if (state.setRpm > minR) { state.setRpm = Math.max(minR, state.setRpm - 100); state.actualRpm = state.setRpm; }
      }
      if (tag === 14) {
        state.partsToday++;
        state.partsTotal++;
        showToast('Parts count: ' + state.partsToday, now);
      }
      break;
    case PANEL.ALARM: {
      if (tag === 2) state.alarmCursor = (state.alarmCursor - 1 + state.alarms.length) % state.alarms.length;
      if (tag === 4) state.alarmCursor = (state.alarmCursor + 1) % state.alarms.length;
      if (tag === 11) showToast('Alarm detail (not implemented)', now);
      if (tag === 12 && state.role === ROLE.ADMIN) {
        state.alarms[state.alarmCursor].active = false;
        showToast('Alarm reset', now);
      }
      if (tag === 13) {
        const filters = ['all', 'error', 'warn', 'info'];
        const idx = filters.indexOf(state.alarmFilter);
        state.alarmFilter = filters[(idx + 1) % filters.length];
        state.alarmCursor = 0;
      }
      break;
    }
    case PANEL.LOG: {
      const ROW_H = 34;
      const y0 = HDR_H + 12 + 34 + 38;
      const visible = Math.floor((H - 8 - y0) / ROW_H);
      if (tag === 2 || tag === 11) { if (state.logScroll > 0) state.logScroll--; }
      if (tag === 4 || tag === 12) { if (state.logScroll + visible < LOG_DATA.length) state.logScroll++; }
      break;
    }
    case PANEL.SETTINGS: {
      const p = state.settingsParams;
      if (!state.settingsEditing) {
        if (tag === 2) state.settingsCursor = (state.settingsCursor - 1 + 4) % 4;
        if (tag === 4) state.settingsCursor = (state.settingsCursor + 1) % 4;
        if (tag === 3) state.settingsEditing = true;
        if (tag === 11 && state.settingsChanged) {
          state.settingsChanged = false;
          showToast('Settings saved', now);
        }
      } else {
        /* + ボタン (R1) */
        if (tag === 11) {
          if (state.settingsCursor === 0) p.maxRpm = Math.min(3000, p.maxRpm + 100);
          if (state.settingsCursor === 1) p.minRpm = Math.min(p.maxRpm - 100, p.minRpm + 100);
          if (state.settingsCursor === 2) {
            p.feedPattern = (p.feedPattern + 1) % 2;
            const maxIdx = FEED_PATTERNS[p.feedPattern].length - 1;
            if (state.feedIdx > maxIdx) state.feedIdx = maxIdx;
          }
          if (state.settingsCursor === 3) p.toolNo = Math.min(5, p.toolNo + 1);
          state.settingsChanged = true;
        }
        /* - ボタン (R2) */
        if (tag === 12) {
          if (state.settingsCursor === 0) p.maxRpm = Math.max(p.minRpm + 100, p.maxRpm - 100);
          if (state.settingsCursor === 1) p.minRpm = Math.max(0, p.minRpm - 100);
          if (state.settingsCursor === 2) {
            p.feedPattern = (p.feedPattern + 1) % 2;
            const maxIdx = FEED_PATTERNS[p.feedPattern].length - 1;
            if (state.feedIdx > maxIdx) state.feedIdx = maxIdx;
          }
          if (state.settingsCursor === 3) p.toolNo = Math.max(1, p.toolNo - 1);
          state.settingsChanged = true;
        }
        /* OK (R3) または 決定 (L3) で編集終了 */
        if (tag === 13 || tag === 3) state.settingsEditing = false;
      }
      break;
    }
    case PANEL.USERS: {
      if (tag === 2) state.userCursor = (state.userCursor - 1 + USER_DATA.length) % USER_DATA.length;
      if (tag === 4) state.userCursor = (state.userCursor + 1) % USER_DATA.length;
      const u = USER_DATA[state.userCursor];
      if (tag === 3 && u.role !== 'Admin') {
        /* L3 決定でも切り替え（トグル） */
        u.active = !u.active;
        showToast(u.name + ' -> ' + (u.active ? 'Active' : 'Inactive'), now);
      }
      if (tag === 11 && u.role !== 'Admin' && !u.active) {
        u.active = true;
        showToast(u.name + ' -> Active', now);
      }
      if (tag === 12 && u.role !== 'Admin' && u.active) {
        u.active = false;
        showToast(u.name + ' -> Inactive', now);
      }
      break;
    }
  }
}

function startAuth(role, now) {
  state.authPending = role; state.authStart = now; state.screen = SCREEN.AUTH;
}

canvas.addEventListener('click', e => {
  const r   = canvas.getBoundingClientRect();
  const scx = W / r.width;
  const x   = Math.floor((e.clientX - r.left) * scx);
  const y   = Math.floor((e.clientY - r.top)  * scx);
  const tag = getTag(x, y);
  if (tag) handleTag(tag, performance.now());
});

/* ═══════════════════════════════════════════════
   ループ
═══════════════════════════════════════════════ */
function p2(n) { return String(n).padStart(2, '0'); }

function loop(now) {
  update(now);
  render(now);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
