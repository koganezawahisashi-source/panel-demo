/* ═══════════════════════════════════════════════
   Canvas
═══════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

/* ═══════════════════════════════════════════════
   描画ヘルパー
═══════════════════════════════════════════════ */
function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}
function strokeRect(x, y, w, h, color, lw = 1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.strokeRect(x + .5, y + .5, w - 1, h - 1);
}
function hline(x, y, w, color, lw = 1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(x, y + .5); ctx.lineTo(x + w, y + .5); ctx.stroke();
}
function vline(x, y, h, color, lw = 1) {
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(x + .5, y); ctx.lineTo(x + .5, y + h); ctx.stroke();
}

/* フォントスケールを適用 */
function text(x, y, str, color, size = 13, align = 'left', baseline = 'middle', bold = false) {
  ctx.fillStyle    = color;
  ctx.font         = `${bold ? '700' : '400'} ${Math.round(size * FONT_SCALE)}px "Segoe UI", Arial, sans-serif`;
  ctx.textAlign    = align;
  ctx.textBaseline = baseline;
  ctx.fillText(str, x, y);
}

function bar(x, y, w, h, pct, fg) {
  rect(x, y, w, h, C.BG);
  if (pct > 0) rect(x, y, Math.round(w * pct / 100), h, fg);
}

/* 円弧進捗グラフ（-PI/2=上端から時計回りに pct% 分描画、丸キャップ） */
function drawArc(cx, cy, r, bgColor, fgColor, lw, pct) {
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = bgColor; ctx.stroke();
  if (pct > 0) {
    const start = -Math.PI / 2;
    const end   = start + Math.PI * 2 * pct / 100;
    ctx.beginPath(); ctx.arc(cx, cy, r, start, end);
    ctx.strokeStyle = fgColor; ctx.stroke();
  }
  ctx.lineCap = 'butt';
}

/* 秒数 → "MM:SS" 文字列 */
function fmtMMSS(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

/* 工具残量に応じた色 */
function toolLifeColor(remPct) {
  if (remPct < 10) return C.RED;
  if (remPct < 20) return C.YELLOW;
  return C.GREEN;
}
function card(x, y, w, h) {
  rect(x, y, w, h, C.CARD);
  strokeRect(x, y, w, h, C.BORDER);
}
function chip(x, y, label, color) {
  const tw = label.length * 9 + 18;
  ctx.fillStyle = color + '22'; ctx.fillRect(x, y, tw, 26);
  ctx.strokeStyle = color + '44'; ctx.lineWidth = 1;
  ctx.strokeRect(x + .5, y + .5, tw - 1, 25);
  text(x + tw / 2, y + 13, label, color, 11, 'center');
}
/* 長いテキストを最大2行に折り返して描画 */
function textWrap2(x, y1, y2, str, color, size, maxW) {
  const scaledSize = Math.round(size * FONT_SCALE);
  ctx.font = `400 ${scaledSize}px "Segoe UI", Arial, sans-serif`;
  if (ctx.measureText(str).width <= maxW) {
    text(x, y1, str, color, size, 'left', 'middle');
    return;
  }
  const words = str.split(' ');
  let line1 = '';
  for (const w of words) {
    const test = line1 ? line1 + ' ' + w : w;
    if (ctx.measureText(test).width > maxW) break;
    line1 = test;
  }
  const line2 = str.slice(line1.length).trim();
  text(x, y1, line1, color, size, 'left', 'middle');
  if (line2) text(x, y2, line2, color, size, 'left', 'middle');
}

/* ═══════════════════════════════════════════════
   左固定ボタン
═══════════════════════════════════════════════ */
function drawLeftButtons() {
  for (let i = 0; i < 4; i++) {
    const y = BTN_Y[i];
    rect(0, y, BTN_W, BTN_H, C.SURF);
    hline(0, y + BTN_H - 1, BTN_W, C.BORDER);
    vline(BTN_W - 1, y, BTN_H, C.BORDER);
  }
  drawIconMenu(0, BTN_Y[0]);
  drawIconUp  (0, BTN_Y[1]);
  drawIconOk  (0, BTN_Y[2]);
  drawIconDown(0, BTN_Y[3]);
}
function drawIconMenu(bx, by) {
  ctx.strokeStyle = C.TXT2; ctx.lineWidth = 3;
  [30, 45, 60].forEach(dy => {
    ctx.beginPath(); ctx.moveTo(bx + 22, by + dy); ctx.lineTo(bx + 68, by + dy); ctx.stroke();
  });
}
function drawIconUp(bx, by) {
  ctx.strokeStyle = C.TXT2; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 45, by + 28); ctx.lineTo(bx + 22, by + 62);
  ctx.moveTo(bx + 45, by + 28); ctx.lineTo(bx + 68, by + 62);
  ctx.stroke();
}
function drawIconOk(bx, by) {
  ctx.strokeStyle = C.GREEN; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 22, by + 48); ctx.lineTo(bx + 38, by + 62); ctx.lineTo(bx + 68, by + 28);
  ctx.stroke();
}
function drawIconDown(bx, by) {
  ctx.strokeStyle = C.TXT2; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bx + 22, by + 28); ctx.lineTo(bx + 45, by + 62);
  ctx.moveTo(bx + 68, by + 28); ctx.lineTo(bx + 45, by + 62);
  ctx.stroke();
}

/* ═══════════════════════════════════════════════
   右可変ボタン
═══════════════════════════════════════════════ */
function drawRightBtn(idx, label, bgColor, enabled = true, fontSize = 14) {
  const y  = BTN_Y[idx];
  const bg = enabled ? bgColor : C.SURF;
  const fc = enabled ? C.TXT   : C.TXT3;
  rect(RIGHT_X, y, BTN_W, BTN_H, bg);
  vline(RIGHT_X, y, BTN_H, C.BORDER);
  hline(RIGHT_X, y + BTN_H - 1, BTN_W, C.BORDER);
  if (label) text(RIGHT_X + BTN_W / 2, y + BTN_H / 2, label, fc, fontSize, 'center');
}

/* ═══════════════════════════════════════════════
   ヘッダバー
═══════════════════════════════════════════════ */
function renderHeader() {
  rect(CONT_X, 0, CONT_W, HDR_H, C.SURF);
  hline(CONT_X, HDR_H - 1, CONT_W, C.BORDER);

  text(CONT_X + 12, HDR_H / 2, 'NCS', C.ACCENT, 14, 'left', 'middle', true);
  vline(CONT_X + 76, 10, HDR_H - 20, C.BORDER);
  text(CONT_X + 86, HDR_H / 2, 'CNC-8100S', C.TXT, 13, 'left', 'middle', true);

  const stLabel = state.machine === MACHINE.RUNNING ? 'RUNNING' : 'STOPPED';
  const stCol   = state.machine === MACHINE.RUNNING ? C.GREEN   : C.RED;
  chip(CONT_X + 310, (HDR_H - 26) / 2, stLabel, stCol);

  const ts = `${p2(state.rtcH)}:${p2(state.rtcM)}:${p2(state.rtcS)}`;
  text(RIGHT_X - 8, 10, state.userName,    C.TXT,  13, 'right', 'top');
  text(RIGHT_X - 8, 36, state.userRoleStr, C.TXT2, 12, 'right', 'top');
  text(RIGHT_X - 8, 60, ts,               C.TXT2, 13, 'right', 'top');

  /* アクティブアラームバッジ */
  const activeCount = state.alarms.filter(a => a.active).length;
  if (activeCount > 0) {
    const bx = CONT_X + 310 + 120;
    const by = (HDR_H - 22) / 2;
    rect(bx, by, 54, 22, C.RED);
    text(bx + 27, by + 11, '\u26a0 ' + activeCount, C.WHITE, 11, 'center', 'middle', true);
  }
}

/* ═══════════════════════════════════════════════
   ロック画面
═══════════════════════════════════════════════ */
function renderLock(now) {
  rect(CONT_X, 0, CONT_W, H, C.BG);

  const cx = CONT_X + CONT_W / 2, cy = H / 2 - 40;

  /* RFID 拡大フレームアニメ（正方形、EVE互換） */
  const t = now % 2400;
  [[0, 40], [800, 62], [1600, 84]].forEach(([delay, size]) => {
    let phase = (t + 2400 - delay) % 2400;
    let alpha = phase < 1800 ? (1 - phase / 1800) * 0.55 : 0;
    if (alpha < 0.01) return;
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.strokeStyle = C.ACCENT; ctx.lineWidth = 2;
    ctx.strokeRect(cx - size, cy - size, size * 2, size * 2);
    ctx.restore();
  });

  rect(cx - 28, cy - 28, 56, 56, C.CARD);
  strokeRect(cx - 28, cy - 28, 56, 56, C.BORDER);
  text(cx, cy, 'ID', C.ACCENT, 18, 'center', 'middle', true);

  text(cx, 52, 'NEXUS CONTROL SYSTEMS', C.TXT2, 13, 'center');
  text(cx, cy + 96, 'Present RFID card  —  or select role \u2192', C.TXT2, 13, 'center');

  const ts = `${p2(state.rtcH)}:${p2(state.rtcM)}:${p2(state.rtcS)}`;
  text(cx, H - 58, ts, C.TXT, 36, 'center', 'middle');
  const dateStr = state.rtcYear + '/' + p2(state.rtcMon) + '/' + p2(state.rtcDay);
  text(cx, H - 20, dateStr, C.TXT2, 13, 'center');

  drawRightBtn(0, 'OPR', state.lockCursor === 0 ? C.ACCENT : C.CARD, true);
  drawRightBtn(1, 'ADM', state.lockCursor === 1 ? C.ACCENT : C.CARD, true);
  drawRightBtn(2, '', C.SURF, false);
  drawRightBtn(3, '', C.SURF, false);
}

/* ═══════════════════════════════════════════════
   認証オーバーレイ
═══════════════════════════════════════════════ */
function renderAuth(now) {
  ctx.save(); ctx.globalAlpha = 0.75;
  rect(CONT_X, 0, CONT_W, H, C.BG);
  ctx.restore();

  const cx = CONT_X + CONT_W / 2, cy = H / 2;
  rect(cx - 150, cy - 90, 300, 180, C.CARD);
  strokeRect(cx - 150, cy - 90, 300, 180, C.BORDER);

  /* 3点滅ブロック（EVE: RECTS で実装可能） */
  const step = Math.floor(now / 350) % 3;
  [-26, 0, 26].forEach((dx, i) => {
    rect(cx + dx - 10, cy - 38, 20, 20, i === step ? C.ACCENT : C.CARD2);
    strokeRect(cx + dx - 10, cy - 38, 20, 20, C.BORDER);
  });

  text(cx, cy + 16, 'Authenticating...', C.TXT2, 14, 'center');
}

/* ═══════════════════════════════════════════════
   認証成功バナー（上端からスライドイン）
═══════════════════════════════════════════════ */
function renderAuthNotif(now) {
  const SLIDE_MS = 220, HOLD_MS = 1000, TOTAL_MS = SLIDE_MS * 2 + HOLD_MS;
  const elapsed  = now - state.authNotifStart;
  if (elapsed >= TOTAL_MS) { state.authNotifActive = false; return; }

  const panelH = Math.floor(H / 4);   /* 120px */
  let offsetY;
  if (elapsed < SLIDE_MS) {
    const t = elapsed / SLIDE_MS;
    offsetY = -panelH * (1 - (1 - Math.pow(1 - t, 3)));   /* ease-out cubic */
  } else if (elapsed < SLIDE_MS + HOLD_MS) {
    offsetY = 0;
  } else {
    const t = (elapsed - SLIDE_MS - HOLD_MS) / SLIDE_MS;
    offsetY = -panelH * Math.pow(t, 3);                    /* ease-in cubic */
  }

  ctx.save();
  ctx.beginPath();
  ctx.rect(CONT_X, 0, CONT_W, panelH);
  ctx.clip();

  rect(CONT_X, offsetY, CONT_W, panelH, '#0d2040');
  /* 下辺アクセントライン */
  ctx.strokeStyle = C.GREEN; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(CONT_X, offsetY + panelH); ctx.lineTo(CONT_X + CONT_W, offsetY + panelH); ctx.stroke();
  /* チェックサークル */
  const cx  = CONT_X + 64, cy = offsetY + panelH / 2;
  ctx.strokeStyle = C.GREEN; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = C.GREEN; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx - 11, cy); ctx.lineTo(cx - 3, cy + 9); ctx.lineTo(cx + 12, cy - 10); ctx.stroke();
  /* テキスト */
  const tx = CONT_X + 110;
  text(tx, offsetY + 28, 'Authentication Successful', C.GREEN, 13, 'left', 'middle', true);
  text(tx, offsetY + 60, state.authNotifName, C.TXT,  18, 'left', 'middle', true);
  text(tx, offsetY + 94, state.authNotifRole, C.TXT2, 13, 'left', 'middle');

  ctx.restore();
}

/* ═══════════════════════════════════════════════
   アラーム詳細パネル（タブが隠れる高さまでスライドイン）
═══════════════════════════════════════════════ */
function renderAlarmDetail(now) {
  const SLIDE_MS = 300;
  /* タブ行（y≈144）が隠れる高さ：H - HDR_H - 40 */
  const panelH   = H - HDR_H - 40;   /* 約 360px */
  const elapsed  = now - state.alarmDetailStart;

  let offsetY;
  if (state.alarmDetailClosing) {
    const t = Math.min(elapsed / SLIDE_MS, 1);
    offsetY  = panelH * Math.pow(t, 3);
    if (t >= 1) { state.alarmDetailOpen = false; state.alarmDetailClosing = false; return; }
  } else {
    const t = Math.min(elapsed / SLIDE_MS, 1);
    offsetY  = panelH * (1 - (1 - Math.pow(1 - t, 3)));
  }

  const al  = state.alarms[state.alarmCursor];
  const lc  = al.level === 'error' ? C.RED : al.level === 'warn' ? C.YELLOW : C.ACCENT;
  const py  = H - panelH + offsetY;
  const DW  = CONT_W - 28;   /* 詳細テキスト最大幅 */

  ctx.save();
  ctx.beginPath();
  ctx.rect(CONT_X, H - panelH, CONT_W, panelH);
  ctx.clip();

  /* ─── 背景・上辺アクセント ─── */
  rect(CONT_X, py, CONT_W, panelH, '#081828');
  ctx.strokeStyle = lc; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(CONT_X, py); ctx.lineTo(CONT_X + CONT_W, py); ctx.stroke();

  /* ─── ヘッダ行 ─── */
  const lvlLabel = al.level.toUpperCase();
  rect(CONT_X + 14, py + 16, 68, 28, lc + '33');
  strokeRect(CONT_X + 14, py + 16, 68, 28, lc, 1);
  text(CONT_X + 48,          py + 30, lvlLabel,  lc,    12, 'center', 'middle', true);
  text(CONT_X + 94,          py + 30, al.title,  C.TXT, 15, 'left',   'middle', true);
  const stLabel = al.active ? 'ACTIVE' : 'RESET';
  const stCol   = al.active ? C.RED    : C.GREEN;
  rect(CONT_X + CONT_W - 90, py + 16, 76, 28, stCol + '33');
  strokeRect(CONT_X + CONT_W - 90, py + 16, 76, 28, stCol, 1);
  text(CONT_X + CONT_W - 52, py + 30, stLabel, stCol, 12, 'center', 'middle', true);

  hline(CONT_X + 14, py + 58, DW, C.BORDER);

  /* ─── 詳細テキスト（2行折り返し対応、常に2行分の高さを確保） ─── */
  text(CONT_X + 14, py + 74, 'Detail', C.TXT2, 10, 'left', 'middle', true);
  textWrap2(CONT_X + 14, py + 96, py + 124, al.detail, C.TXT2, 12, DW);

  hline(CONT_X + 14, py + 148, DW, C.BORDER);

  /* ─── メタ情報 ─── */
  const LX = CONT_X + 14, VX = CONT_X + 180;
  text(LX, py + 168, 'Time',      C.TXT2, 11, 'left', 'middle', true);
  text(VX, py + 168, al.time,     C.TXT,  11, 'left', 'middle');
  text(LX, py + 198, 'Level',     C.TXT2, 11, 'left', 'middle', true);
  text(VX, py + 198, al.level.charAt(0).toUpperCase() + al.level.slice(1), lc, 11, 'left', 'middle', true);
  text(LX, py + 228, 'Reset Auth',C.TXT2, 11, 'left', 'middle', true);
  text(VX, py + 228, al.adminOnly ? 'Admin only' : 'Any user',
       al.adminOnly ? C.YELLOW : C.TXT2, 11, 'left', 'middle');
  text(LX, py + 258, 'Status',    C.TXT2, 11, 'left', 'middle', true);
  text(VX, py + 258, stLabel,     stCol,  11, 'left', 'middle', true);

  hline(CONT_X + 14, py + 282, DW, C.BORDER);

  /* ─── フッタヒント ─── */
  text(CONT_X + CONT_W / 2, py + 310, '[ DTL ] to close', C.TXT2, 10, 'center', 'middle');

  ctx.restore();
}

    { y0: y + 0,   h: 72  },   /* 0: Machine Control */
    { y0: y + 72,  h: 92  },   /* 1: RPM */
    { y0: y + 164, h: 80  },   /* 2: Feed Rate */

       isEd ? C.ACCENT : '#4F8EF7', 10, 'right', 'middle');

  const stStr = state.machine === MACHINE.RUNNING ? 'RUNNING' : 'STOPPED';

  text(CONT_X + lw - 16,            y + 140, rpmMax + '',                             C.TXT2, 10, 'right',  'top');

    text(CONT_X + 16, y + lh - 10, '\u2191\u2193 Select   OK = Edit', C.TXT2, 10, 'left', 'bottom');

  /* 右カード上：ステータス */

  if (isEd) {
    drawRightBtn(0, '+', C.ACCENT, true, 26);
    drawRightBtn(1, '-', C.CARD,   true, 26);
    drawRightBtn(2, '',  C.SURF,  false);
    drawRightBtn(3, '',  C.SURF,  false);
  } else {
    [0, 1, 2, 3].forEach(i => drawRightBtn(i, '', C.SURF, false));
  }
}

/* ═══════════════════════════════════════════════
   アラーム
═══════════════════════════════════════════════ */
function renderAlarm() {
  let y = HDR_H + 12;
  text(CONT_X + 8, y + 12, 'Alarms', C.TXT, 17, 'left', 'top', true);
  y += 52;

  /* フィルタタブ */
  const tabs    = ['ALL', 'ERR', 'WARN', 'INFO'];
  const filters = ['all', 'error', 'warn', 'info'];
  tabs.forEach((t, i) => {
    const sel = state.alarmFilter === filters[i];
    rect(CONT_X + 8 + i * 74, y, 68, 30, sel ? C.ACCENT : C.CARD2);
    text(CONT_X + 8 + i * 74 + 34, y + 15, t, sel ? C.WHITE : C.TXT2, 12, 'center');
  });
  y += 38;

  const ROW_H_AL = 64;
  const filtered = state.alarms.map((al, i) => ({ al, i })).filter(({ al }) => {
    if (state.alarmFilter === 'error') return al.level === 'error';
    if (state.alarmFilter === 'warn')  return al.level === 'warn';
    if (state.alarmFilter === 'info')  return al.level === 'info';
    return true;
  });
  const visAl = Math.floor((H - 8 - y) / ROW_H_AL);
  /* カーソルが見えるようスクロール自動調整 */
  const curPos = filtered.findIndex(({ i }) => i === state.alarmCursor);
  if (curPos >= 0) {
    if (curPos < state.alarmScroll) state.alarmScroll = curPos;
    if (curPos >= state.alarmScroll + visAl) state.alarmScroll = curPos - visAl + 1;
  }
  /* スクロール表示件数インジケータ */
  if (filtered.length > 0) {
    const end = Math.min(state.alarmScroll + visAl, filtered.length);
    text(RIGHT_X - 8, HDR_H + 20, `${state.alarmScroll + 1}-${end}/${filtered.length}`, C.TXT2, 10, 'right', 'top');
  }
  filtered.slice(state.alarmScroll, state.alarmScroll + visAl).forEach(({ al, i }, row) => {
    const lc  = al.level === 'error' ? C.RED : al.level === 'warn' ? C.YELLOW : C.ACCENT;
    const ay  = y + row * ROW_H_AL;
    const rh  = ROW_H_AL - 2;
    const sel = state.alarmCursor === i;
    rect(CONT_X + 8, ay, CONT_W - 16, rh, sel ? '#0e2a45' : C.CARD);
    strokeRect(CONT_X + 8, ay, CONT_W - 16, rh, sel ? C.ACCENT : C.BORDER, sel ? 2 : 1);
    rect(CONT_X + 8, ay, 6, rh, sel ? lc : lc + '88');
    /* 行1：タイトル（左）＋ ACTIVE/RESET バッジ（右） */
    text(CONT_X + 20, ay + 14, al.title, C.TXT, 12, 'left', 'middle', true);
    const stLabel = al.active ? 'ACTIVE' : 'RESET';
    const stCol   = al.active ? lc       : C.TXT3;
    text(CONT_X + CONT_W - 24, ay + 14, stLabel, stCol, 10, 'right', 'middle', al.active);
    /* 行2：レベル色ドット（既読はグレー） ＋ 日時 */
    ctx.fillStyle = al.viewed ? C.TXT3 : lc;
    ctx.beginPath(); ctx.arc(CONT_X + 23, ay + 44, 4, 0, Math.PI * 2); ctx.fill();
    text(CONT_X + 34, ay + 44, al.time, C.TXT2, 10, 'left', 'middle');
  });
  if (filtered.length === 0) {
    text(CONT_X + CONT_W / 2, y + 50, 'No alarms', C.TXT2, 14, 'center');
  }

  const canReset  = state.role === ROLE.ADMIN;
  const alFilters = ['all', 'error', 'warn', 'info'];
  drawRightBtn(0, 'DTL',  C.CARD);
  drawRightBtn(1, 'RST',  canReset ? C.YELLOW : C.SURF, canReset);
  drawRightBtn(2, 'PREV', C.CARD);
  drawRightBtn(3, 'NEXT', C.CARD);
}

  /* カラムヘッダ */
  rect(CONT_X + 8, y, CONT_W - 16, 30, C.SURF);
  text(CONT_X + 16,  y + 6, 'TIME',  C.TXT2, 10, 'left', 'top');
  text(CONT_X + 130, y + 6, 'USER',  C.TXT2, 10, 'left', 'top');
  text(CONT_X + 260, y + 6, 'EVENT', C.TXT2, 10, 'left', 'top');
  y += 34;

  /* フィルタ */
  const filteredLog = LOG_DATA.filter(l => {
    if (state.logFilter === 'all') return true;
    return l.cat === state.logFilter;
  });

  const ROW_H = 34;
  const visibleCount = Math.floor((H - 8 - y) / ROW_H);
  const start = Math.min(state.logScroll, Math.max(0, filteredLog.length - visibleCount));
  state.logScroll = start;
  const canUp = start > 0;
  const canDn = start + visibleCount < filteredLog.length;

  /* スクロール位置インジケータ */
  if (filteredLog.length > 0) {
    const end = Math.min(start + visibleCount, filteredLog.length);
    text(RIGHT_X - 8, HDR_H + 12 + 14, `${start + 1}-${end}/${filteredLog.length}`, C.TXT2, 10, 'right', 'top');
  }

  filteredLog.slice(start, start + visibleCount).forEach((l, i) => {
    const ly  = y + i * ROW_H;
    const lc  = l.cat === 'alarm' ? C.YELLOW : l.cat === 'login' ? C.ACCENT :
                l.cat === 'settings' || l.cat === 'user' ? C.TEAL : C.TXT;
    if (i % 2 === 0) rect(CONT_X + 8, ly, CONT_W - 16, ROW_H - 1, C.CARD);
    text(CONT_X + 16,  ly + 8, l.time,  C.TXT2, 10, 'left', 'top');
    text(CONT_X + 130, ly + 8, l.user,  C.TXT2, 10, 'left', 'top');
    text(CONT_X + 260, ly + 8, l.event, lc,     10, 'left', 'top');
  });
  if (filteredLog.length === 0) {
    text(CONT_X + CONT_W / 2, y + 40, 'No records', C.TXT2, 13, 'center');
  }

  drawRightBtn(0, 'FEED', C.CARD);
  [1, 2, 3].forEach(i => drawRightBtn(i, '', C.SURF, false));
}

const SETT_ROW_H = 50;

function renderSettings() {

  const hw    = Math.floor((CONT_W - 24) / 2);

  text(CONT_X + 16, y + 8, 'Operation Parameters', C.TXT, 12, 'left', 'top', true);

  const p = state.settingsParams;
  const feedPatternLabel = p.feedPattern === 0 ? 'Pattern 1 (4-step)' : 'Pattern 2 (2-step)';
  const paramRows = [
    ['Max RPM',      p.maxRpm + ''],
    ['Min RPM',      p.minRpm + ''],
    ['Feed Pattern', feedPatternLabel],
    ['Tool No.',     'T' + String(p.toolNo).padStart(2, '0')],

    rect(CONT_X + 8, ry, hw, SETT_ROW_H,
         ed ? '#0d2e50' : sel ? '#1a3a5c' : (i % 2 === 0 ? C.CARD : C.BG));
    hline(CONT_X + 16, ry, hw - 24, ed ? C.ACCENT + '66' : C.BORDER);
    /* 左サイドバー */
    rect(CONT_X + 8, ry, 6, SETT_ROW_H, ed ? C.ACCENT : sel ? '#4F8EF7' : C.BORDER);
    text(CONT_X + 22, ry + 14, k, ed ? C.WHITE : sel ? C.TXT : C.TXT2, 11, 'left', 'top', sel);
    text(CONT_X + 8 + hw - 10, ry + 14, v,
         ed ? C.ACCENT : sel ? C.WHITE : C.TXT, 12, 'right', 'top', sel);
  });

  /* --- System Info --- */
  const rx = CONT_X + 8 + hw + 8;
  card(rx, y, hw, cardH);
  text(rx + 8, y + 8, 'System', C.TXT, 12, 'left', 'top', true);
  [['Panel ID','CNC-7800'],['FW Version','v2.1.0'],['Display','800\u00d7480'],['Network','192.168.1.10']].forEach(([k, v], i) => {
    const ry = y + 34 + i * SETT_ROW_H;
    hline(rx + 8, ry, hw - 24, C.BORDER);
    text(rx + 8,       ry + 12, k, C.TXT2, 11, 'left',  'top');
    text(rx + hw - 10, ry + 12, v, C.TXT,  11, 'right', 'top');

    text(CONT_X + 16, y + cardH + 10, '\u2191\u2193 Select   OK = Edit', C.TXT2, 10, 'left', 'top');
  }

  if (state.settingsEditing) {
    drawRightBtn(0, '+',   C.ACCENT, true, 26);
    drawRightBtn(1, '-',   C.CARD,   true, 26);
    drawRightBtn(2, 'OK',  C.GREEN);
    drawRightBtn(3, '',    C.SURF, false);
  } else {
    const canSave = state.settingsChanged;
    drawRightBtn(0, 'SAVE', canSave ? C.ACCENT : C.SURF, canSave);

function renderToolLife() {
  let y = HDR_H + 12;
  text(CONT_X + 8, y + 12, 'Tool Life Management', C.TXT, 17, 'left', 'top', true);
  const isAdmin = state.role === ROLE.ADMIN;
  if (isAdmin) text(CONT_X + CONT_W - 8, y + 18, '[ADMIN ONLY]', C.YELLOW, 12, 'right', 'top');
  y += 52;

  /* テーブルヘッダ */
  rect(CONT_X + 8, y, CONT_W - 16, 28, C.SURF);
  text(CONT_X + 16,  y + 6, '#',         C.TXT2, 10, 'left', 'top');
  text(CONT_X + 44,  y + 6, 'Name',      C.TXT2, 10, 'left', 'top');
  text(CONT_X + 270, y + 6, 'Usage',     C.TXT2, 10, 'left', 'top');
  text(CONT_X + 370, y + 6, 'Life Bar',  C.TXT2, 10, 'left', 'top');
  text(CONT_X + CONT_W - 16, y + 6, 'Rem', C.TXT2, 10, 'right', 'top');
  y += 32;

  const vis = Math.floor((H - 8 - y) / TOOL_ROW_H);
  if (state.toolCursor < state.toolScroll) state.toolScroll = state.toolCursor;
  if (state.toolCursor >= state.toolScroll + vis) state.toolScroll = state.toolCursor - vis + 1;

  state.tools.slice(state.toolScroll, state.toolScroll + vis).forEach((t, row) => {
    const idx = row + state.toolScroll;
    const sel = state.toolCursor === idx;
    const ry  = y + row * TOOL_ROW_H;
    const usedPct = t.life > 0 ? Math.min(Math.round(t.usage * 100 / t.life), 100) : 0;
    const remPct  = 100 - usedPct;
    const lifeCol = toolLifeColor(remPct);

    rect(CONT_X + 8, ry, CONT_W - 16, TOOL_ROW_H - 2,
         sel ? '#0e2a45' : idx % 2 === 0 ? C.CARD : C.BG);
    if (sel) strokeRect(CONT_X + 8, ry, CONT_W - 16, TOOL_ROW_H - 2, C.ACCENT, 1);
    rect(CONT_X + 8, ry, 4, TOOL_ROW_H - 2, sel ? C.ACCENT : C.BORDER);

    const mid = ry + (TOOL_ROW_H - 2) / 2;
    text(CONT_X + 16,  mid, t.number, C.TXT2, 10, 'left',  'middle');
    text(CONT_X + 44,  mid, t.name,   C.TXT,  10, 'left',  'middle');
    text(CONT_X + 270, mid, t.usage + '/' + t.life, C.TXT2, 10, 'left', 'middle');
    /* 寿命バー */
    const bx = CONT_X + 370, bw = 160, bh = 12, by = mid - 6;
    rect(bx, by, bw, bh, C.CARD2);
    rect(bx, by, Math.round(bw * usedPct / 100), bh, lifeCol);
    /* 残量% */
    const remStr = remPct + '%' + (remPct < 20 ? '!!' : '');
    text(CONT_X + CONT_W - 16, mid, remStr, lifeCol, 10, 'right', 'middle');
  });

  drawRightBtn(0, 'RST', isAdmin ? C.YELLOW : C.SURF, isAdmin);
  [1, 2, 3].forEach(i => drawRightBtn(i, '', C.SURF, false));
}

/* ═══════════════════════════════════════════════
   座標・NCプログラム
═══════════════════════════════════════════════ */
function renderCoordinate() {
  const ix = CONT_X + 8, iw = CONT_W - 16;
  let y = HDR_H + 4;

  /* プログラムカード */
  const pCardH = 44;
  card(ix, y, iw, pCardH);
  text(ix + 10,      y + pCardH / 2, 'O' + String(state.ncProgramNo).padStart(4, '0'), C.TXT,  13, 'left',  'middle', true);
  text(ix + 130,     y + pCardH / 2, 'N' + String(state.ncBlockNo).padStart(4, '0'),   C.TXT2, 13, 'left',  'middle');
  text(ix + 260,     y + pCardH / 2, 'Mode: ' + state.machineMode,                     C.TXT2, 11, 'left',  'middle');
  text(ix + iw - 10, y + pCardH / 2, 'Feed: ' + state.feedOverridePct + '%',           C.TXT2, 11, 'right', 'middle');
  y += pCardH + 4;

  /* XYZ カード */
  const xyzH = 192;
  card(ix, y, iw, xyzH);
  const axes = [
    { label: 'X', val: state.coordX },
    { label: 'Y', val: state.coordY },
    { label: 'Z', val: state.coordZ },
  ];
  const axisRowH = Math.floor(xyzH / 3);
  axes.forEach((ax, i) => {
    const ay = y + i * axisRowH;
    if (i > 0) hline(ix + 8, ay, iw - 16, C.BORDER);
    text(ix + 14, ay + axisRowH / 2, ax.label, C.TXT2, 13, 'left', 'middle', true);
    const neg  = ax.val < 0;
    const zero = ax.val === 0;
    const col  = neg ? C.ORANGE : zero ? C.TXT2 : C.TXT;
    const absV = Math.abs(ax.val);
    const intP = Math.floor(absV / 1000);
    const fracP = absV % 1000;
    const sign  = neg ? '-' : ax.val > 0 ? '+' : ' ';
    const valStr = sign + String(intP).padStart(3, ' ') + '.' + String(fracP).padStart(3, '0');
    text(ix + iw - 10, ay + axisRowH / 2, valStr, col, 28, 'right', 'middle', true);
  });
  y += xyzH + 4;

  /* NC ブロックカード */
  const nbH = 44;
  card(ix, y, iw, nbH);
  text(ix + 10, y + nbH / 2, state.ncBlockText, C.TEAL, 11, 'left', 'middle');
  y += nbH + 4;

  /* ステータスバー */
  const sbH = 36;
  const stStr = state.machine === MACHINE.RUNNING ? '\u25b6 RUNNING' : '\u25a0 STOPPED';
  const stCol = state.machine === MACHINE.RUNNING ? C.GREEN : C.RED;
  rect(ix, y, iw, sbH, C.SURF);
  strokeRect(ix, y, iw, sbH, C.BORDER);
  text(ix + 10,  y + sbH / 2, stStr,                          stCol,  12, 'left', 'middle', true);
  text(ix + 160, y + sbH / 2, state.actualRpm + ' rpm',       C.TXT2, 11, 'left', 'middle');
  text(ix + 290, y + sbH / 2, 'Load: ' + state.spindleLoad + '%', C.TXT2, 11, 'left', 'middle');
  text(ix + 420, y + sbH / 2, 'Tmp: ' + state.spindleTemp + '\u00b0C', C.TXT2, 11, 'left', 'middle');

  [0, 1, 2, 3].forEach(i => drawRightBtn(i, '', C.SURF, false));
}

function renderProduction() {
  let y = HDR_H + 12;

  ['DAILY', 'WEEKLY', 'MONTHLY'].forEach((lbl, i) => {

  });

  rect(CONT_X + 8, y, CONT_W - 16, 36, C.SURF);
  strokeRect(CONT_X + 8, y, CONT_W - 16, 36, C.BORDER);
  text(CONT_X + 20,  y + 18, 'Total: ' + state.prodTotalParts,    C.TXT,   11, 'left',  'middle', true);
  text(CONT_X + 170, y + 18, 'OpRate: ' + state.prodOpRatePct + '%', C.GREEN, 11, 'left', 'middle');

  text(CONT_X + CONT_W - 16, y + 18, dateStr, C.TXT2, 11, 'right', 'middle');
  y += 44;

  /* W1/W2/W3 進捗バー（行高36pxに縮小） */
  const pCols   = [C.ACCENT, C.TEAL, C.GREEN];
  const progH   = state.workPrograms.length * 36 + 12;
  card(CONT_X + 8, y, CONT_W - 16, progH);
  state.workPrograms.forEach((wp, i) => {
    const wy  = y + 6 + i * 36;
    const pct = wp.target > 0 ? Math.round(wp.completed * 100 / wp.target) : 0;
    text(CONT_X + 16, wy + 9, wp.name, C.TXT2, 10, 'left', 'middle');
    const bx = CONT_X + 110, bw = CONT_W - 180, bh = 14;
    rect(bx, wy + 4, bw, bh, C.CARD2);
    rect(bx, wy + 4, Math.round(bw * pct / 100), bh, pCols[i]);
    text(CONT_X + CONT_W - 16, wy + 9, wp.completed + '/' + wp.target, C.TXT, 10, 'right', 'middle');
  });
  y += progH + 4;

  /* トレンドバー（期間切替対応） */
  const WEEKLY_DATA  = [2240, 2100, 2380, 2050, 2290, 2410, 2180];
  const MONTHLY_DATA = [9200, 8700, 9500, 8900, 9800, 9100, 9350];
  let trendData, trendLabel;
  if (state.prodPeriod === 1) {
    trendData = WEEKLY_DATA;  trendLabel = 'Weekly Trend (7 weeks)';
  } else if (state.prodPeriod === 2) {
    trendData = MONTHLY_DATA; trendLabel = 'Monthly Trend (7 months)';
  } else {
    trendData = state.prodDaily; trendLabel = 'Daily Trend (7 days)';
  }
  const trendH = H - y - 8;
  if (trendH > 60) {
    card(CONT_X + 8, y, CONT_W - 16, trendH);
    text(CONT_X + 16, y + 6, trendLabel, C.TXT2, 10, 'left', 'top');
    const chartY = y + 34, chartH = trendH - 44;
    const maxVal = Math.max(...trendData, 1);
    const barW   = Math.floor((CONT_W - 40) / 7) - 4;
    trendData.forEach((v, i) => {
      const bx  = CONT_X + 20 + i * (barW + 4);
      const bh2 = Math.round(chartH * v / maxVal);
      const col = i === 0 ? C.ACCENT : C.TXT3;
      rect(bx, chartY + chartH - bh2, barW, bh2, col);
      if (v > 0) text(bx + barW / 2, chartY + chartH - bh2 - 4, v + '', col, 9, 'center', 'bottom');
    });
  }

  const periodLabels = ['DAY', 'WEEK', 'MON'];
  drawRightBtn(0, periodLabels[state.prodPeriod], C.CARD);
  [1, 2, 3].forEach(i => drawRightBtn(i, '', C.SURF, false));
}

  text(mx + 14, my + 12, 'NAVIGATION', C.TXT2, 11, 'left', 'top');

  /* スクロール範囲クランプ */
  const maxScroll = Math.max(0, visible.length - MENU_VIS);
  if (state.menuScroll > maxScroll) state.menuScroll = maxScroll;

  visible.slice(state.menuScroll, state.menuScroll + MENU_VIS).forEach((item, i) => {
    const absIdx  = i + state.menuScroll;
    const iy      = my + 38 + i * MENU_ITEM_H;
    const sel     = state.menuCursor === absIdx;
    const cur     = state.panel === item.panel;
    const enabled = !item.admin || state.role === ROLE.ADMIN;
    rect(mx + 4, iy, mw - 8, MENU_ITEM_H - 4,
         (sel && enabled) ? C.ACCENT : cur ? C.CARD2 : C.SURF);
    text(mx + 18, iy + (MENU_ITEM_H - 4) / 2, item.label,
         !enabled ? C.TXT3 : sel ? C.WHITE : cur ? C.ACCENT : C.TXT2, 14, 'left', 'middle');
    if (item.admin) text(mx + mw - 14, iy + (MENU_ITEM_H - 4) / 2, 'ADM',
                         enabled ? C.YELLOW : C.TXT3, 11, 'right', 'middle');
  });

  /* スクロールインジケータ */
  if (visible.length > MENU_VIS) {
    const end = Math.min(state.menuScroll + MENU_VIS, visible.length);
    text(mx + mw - 8, my + totalH - 12,
         (state.menuScroll + 1) + '-' + end + '/' + visible.length, C.TXT2, 9, 'right', 'bottom');
  }
}

/* ═══════════════════════════════════════════════
   トースト
═══════════════════════════════════════════════ */
function renderToast() {
  if (!state.toastVisible) return;
  const tw = 340, th = 42;
  const tx = CONT_X + (CONT_W - tw) / 2, ty = H - 54;
  rect(tx, ty, tw, th, C.CARD2);
  strokeRect(tx, ty, tw, th, C.BORDER);
  text(tx + tw / 2, ty + th / 2, state.toastMsg, C.TXT, 13, 'center');
}

/* ═══════════════════════════════════════════════
   メインレンダリング
═══════════════════════════════════════════════ */
function render(now) {
  ctx.clearRect(0, 0, W, H);
  rect(0, 0, W, H, C.BG);
  drawLeftButtons();

  if (state.screen === SCREEN.LOCK) {
    renderLock(now);
  } else if (state.screen === SCREEN.AUTH) {
    renderLock(now);
    renderAuth(now);
  } else {
    rect(CONT_X, 0, CONT_W, H, C.BG);
    renderHeader();
    switch (state.panel) {
      case PANEL.HOME:        renderHome();        break;
      case PANEL.OPERATION:   renderOperation();   break;
      case PANEL.ALARM:       renderAlarm();       break;
      case PANEL.LOG:         renderLog();         break;
      case PANEL.SETTINGS:    renderSettings();    break;
      case PANEL.USERS:       renderUsers();       break;
      case PANEL.TOOL_LIFE:   renderToolLife();    break;
      case PANEL.COORDINATE:  renderCoordinate();  break;
      case PANEL.MAINTENANCE: renderMaintenance(); break;
      case PANEL.PRODUCTION:  renderProduction();  break;
    }
    if (state.menuOpen) renderMenu();
    if (state.panel === PANEL.ALARM && state.alarmDetailOpen) renderAlarmDetail(now);
    if (state.authNotifActive) renderAuthNotif(now);
    renderToast();
  }
}

/* ═══════════════════════════════════════════════
   状態更新
═══════════════════════════════════════════════ */
function update(now) {
  if (now - state.rtcLast >= 1000) {
    state.rtcLast = now;
    state.rtcS++;
    if (state.rtcS >= 60) { state.rtcS = 0; state.rtcM++; }
    if (state.rtcM >= 60) { state.rtcM = 0; state.rtcH++; }
    if (state.rtcH >= 24) {
      state.rtcH = 0;
      /* 日付ロールオーバー */
      const dpm = [0,31,28,31,30,31,30,31,31,30,31,30,31];
      const isLeap = y => (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
      const days = state.rtcMon === 2 && isLeap(state.rtcYear) ? 29 : dpm[state.rtcMon];
      state.rtcDay++;
      if (state.rtcDay > days) {
        state.rtcDay = 1; state.rtcMon++;
        if (state.rtcMon > 12) { state.rtcMon = 1; state.rtcYear++; }
      }
    }
    if (state.machine === MACHINE.RUNNING) {
      state.opSeconds++;
      if (state.pieceTimeElap < state.pieceTimeEst) {
        state.pieceTimeElap++;
      } else {
        state.pieceTimeElap = 0;
        state.partsToday++;
        state.partsTotal++;
      }
      state.batchTimeElap++;
    }
  }
  if (state.screen === SCREEN.AUTH && now - state.authStart >= state.authDuration) {
    state.role        = state.authPending;
    /* Usersパネルの変更を反映: ロールに合う最初のアクティブユーザーを検索 */
    const roleChar = state.role === ROLE.ADMIN ? 'A' : 'O';
    const foundUser = USER_DATA.find(u => u.role[0] === roleChar && u.active);
    state.userName    = foundUser ? foundUser.name : (state.role === ROLE.ADMIN ? 'Y.Yamada' : 'Operator');
    state.userRoleStr = state.role === ROLE.ADMIN ? 'Admin' : 'Operator';
    state.screen      = SCREEN.MAIN;
    state.panel       = PANEL.HOME;
    state.menuOpen    = false;
    /* 認証成功バナー起動 */
    state.authNotifActive = true;
    state.authNotifStart  = now;
    state.authNotifName   = state.userName;
    state.authNotifRole   = state.userRoleStr;
    addLog('login', 'Login (' + state.userRoleStr + '): ' + state.userName);
  }
  if (state.toastVisible && now - state.toastTick >= 3000) {
    state.toastVisible = false;
  }
}

function showToast(msg, now) {
  state.toastMsg = msg; state.toastTick = now; state.toastVisible = true;
}

/* ═══════════════════════════════════════════════
   タッチ / クリック
═══════════════════════════════════════════════ */
function getTag(x, y) {
  if (x < BTN_W) {
    for (let i = 0; i < 4; i++) {
      if (y >= BTN_Y[i] && y < BTN_Y[i] + BTN_H) return i + 1;
    }
    return 0;
  }
  if (x >= RIGHT_X) {
    for (let i = 0; i < 4; i++) {
      if (y >= BTN_Y[i] && y < BTN_Y[i] + BTN_H) return 11 + i;
    }
    return 0;
  }
  /* ログカテゴリタブ（タグ 40-46） */
  if (state.screen === SCREEN.MAIN && state.panel === PANEL.LOG && !state.menuOpen) {
    const tabY = HDR_H + 12 + 52;
    if (y >= tabY && y < tabY + 30) {
      for (let i = 0; i < LOG_CATS.length; i++) {
        const tx = CONT_X + 8 + i * (LOG_TAB_W + LOG_TAB_GAP);
        if (x >= tx && x < tx + LOG_TAB_W) return 40 + i;
      }
    }
  }
  if (state.screen === SCREEN.MAIN && state.menuOpen) {
    const mx = CONT_X + 20, my = 20, mw = 240;
    const visible = getMenuVisible();
    const showFrom = state.menuScroll;
    const showTo   = Math.min(state.menuScroll + MENU_VIS, visible.length);
    if (x >= mx && x < mx + mw) {
      for (let i = showFrom; i < showTo; i++) {
        const iy = my + 38 + (i - showFrom) * MENU_ITEM_H;
        if (y >= iy && y < iy + MENU_ITEM_H - 4) {
          const item = visible[i];
          return (!item.admin || state.role === ROLE.ADMIN) ? item.tag : 0;
        }
      }
    }
  }
  return 0;
}

function handleTag(tag, now) {
  if (state.screen === SCREEN.AUTH) return;

  if (state.screen === SCREEN.LOCK) {
    if (tag === 2)  state.lockCursor = 0;
    if (tag === 4)  state.lockCursor = 1;
    if (tag === 3)  startAuth(state.lockCursor === 1 ? ROLE.ADMIN : ROLE.OPERATOR, now);
    if (tag === 11) { state.lockCursor = 0; startAuth(ROLE.OPERATOR, now); }
    if (tag === 12) { state.lockCursor = 1; startAuth(ROLE.ADMIN,    now); }
    return;
  }

  if (tag === 1) { state.menuOpen = !state.menuOpen; return; }

  if (state.menuOpen) {
    const visible = getMenuVisible();
    const cnt = visible.length;
    /* OPRはADM項目手前（非ADM最終 index）でカーソルを止める */
    const maxCursor = state.role === ROLE.ADMIN
      ? cnt - 1
      : MENU_ALL.filter(m => !m.admin).length - 1;
    if (tag === 2 && state.menuCursor > 0) {
      /* カーソル UP（トップ止まり） */
      state.menuCursor--;
      if (state.menuCursor < state.menuScroll) state.menuScroll = state.menuCursor;
    }
    if (tag === 4 && state.menuCursor < maxCursor) {
      /* カーソル DOWN（OPR: 非ADM最終項目止まり / ADM: 全項目） */
      state.menuCursor++;
      if (state.menuCursor >= state.menuScroll + MENU_VIS) state.menuScroll = state.menuCursor - MENU_VIS + 1;
    }
    if (tag === 3) {
      const item = MENU_ALL[state.menuCursor];
      if (item && (!item.admin || state.role === ROLE.ADMIN)) {
        state.panel = item.panel;
        state.menuOpen = false;
      }
    }
    /* 項目直接クリック（ADM専用はOPRからは操作不可） */
    const clickedItem = MENU_ALL.find(m => m.tag === tag);
    if (clickedItem && (!clickedItem.admin || state.role === ROLE.ADMIN)) {
      state.panel = clickedItem.panel;
      state.menuOpen = false;
    }
    return;
  }

  switch (state.panel) {
    case PANEL.HOME:
      if (tag === 11) state.panel = PANEL.OPERATION;
      if (tag === 12) state.panel = PANEL.COORDINATE;
      if (tag === 13) state.panel = PANEL.TOOL_LIFE;
      if (tag === 14) {
        addLog('login', 'Logout: ' + state.userName);
        state.screen = SCREEN.LOCK; state.role = ROLE.NONE;
        state.userName = ''; state.userRoleStr = ''; state.lockCursor = 0;
      }
      break;
    case PANEL.OPERATION:
      if (!state.operEditing) {
        /* 項目選択モード: L2=上, L4=下, L3=編集開始 */
        if (tag === 2) state.operCursor = (state.operCursor + 2) % 3;
        if (tag === 4) state.operCursor = (state.operCursor + 1) % 3;
        if (tag === 3) state.operEditing = true;
      } else {
        /* 編集モード: R1=+, R2=-, L3=確定 */
        if (tag === 11) {
          /* + アクション */
          if (state.operCursor === 0) {
            if (state.machine !== MACHINE.RUNNING) {
              state.machine = MACHINE.RUNNING;
              showToast('Machine started', now);
              addLog('operation', 'Machine started');
            }
          } else if (state.operCursor === 1) {
            const maxR = state.settingsParams.maxRpm;
            if (state.setRpm < maxR) {
              const prev = state.setRpm;
              state.setRpm = Math.min(maxR, state.setRpm + 100);
              state.actualRpm = state.setRpm;
              addLog('operation', 'RPM: ' + prev + '\u2192' + state.setRpm);
            }
          } else if (state.operCursor === 2) {
            const prev = getFeedVals()[state.feedIdx];
            state.feedIdx = (state.feedIdx + 1) % getFeedVals().length;
            addLog('operation', 'Feed: ' + prev + '%\u2192' + getFeedVals()[state.feedIdx] + '%');
          }
        }
        if (tag === 12) {
          /* - アクション */
          if (state.operCursor === 0) {
            if (state.machine !== MACHINE.STOPPED) {
              state.machine = MACHINE.STOPPED;
              showToast('Machine stopped', now);
              addLog('operation', 'Machine stopped');
            }
          } else if (state.operCursor === 1) {
            const minR = state.settingsParams.minRpm;
            if (state.setRpm > minR) {
              const prev = state.setRpm;
              state.setRpm = Math.max(minR, state.setRpm - 100);
              state.actualRpm = state.setRpm;
              addLog('operation', 'RPM: ' + prev + '\u2192' + state.setRpm);
            }
          } else if (state.operCursor === 2) {
            const len = getFeedVals().length;
            const prev = getFeedVals()[state.feedIdx];
            state.feedIdx = (state.feedIdx - 1 + len) % len;
            addLog('operation', 'Feed: ' + prev + '%\u2192' + getFeedVals()[state.feedIdx] + '%');
          }
        }
        /* L3=確定 */
        if (tag === 3) {
          state.operEditing = false;
          showToast('Confirmed', now);
        }
      }
      break;
    case PANEL.ALARM: {
      if (tag === 2 || tag === 4) {
        const filt = state.alarms.map((al, i) => ({ al, i })).filter(({ al }) => {
          if (state.alarmFilter === 'error') return al.level === 'error';
          if (state.alarmFilter === 'warn')  return al.level === 'warn';
          if (state.alarmFilter === 'info')  return al.level === 'info';
          return true;
        });
        const pos = filt.findIndex(({ i }) => i === state.alarmCursor);
        if (tag === 2 && pos > 0)              state.alarmCursor = filt[pos - 1].i;
        if (tag === 4 && pos < filt.length - 1) state.alarmCursor = filt[pos + 1].i;
      }
      if (tag === 11) {
        if (state.alarmDetailOpen && !state.alarmDetailClosing) {
          state.alarmDetailClosing = true;
          state.alarmDetailStart   = now;
        } else if (!state.alarmDetailOpen) {
          state.alarmDetailOpen    = true;
          state.alarmDetailClosing = false;
          state.alarmDetailStart   = now;
          state.alarms[state.alarmCursor].viewed = true;
        }
      }
      if (tag === 12 && state.role === ROLE.ADMIN) {
        const al = state.alarms[state.alarmCursor];
        al.active = false;
        showToast('Alarm reset: ' + al.title, now);
        addLog('alarm', 'Alarm reset: ' + al.title);
      }
      /* R3=PREV タブ / R4=NEXT タブ */
      if (tag === 13 || tag === 14) {
        const alFilters = ['all', 'error', 'warn', 'info'];
        const idx = alFilters.indexOf(state.alarmFilter);
        if (tag === 13) state.alarmFilter = alFilters[(idx - 1 + alFilters.length) % alFilters.length];
        if (tag === 14) state.alarmFilter = alFilters[(idx + 1) % alFilters.length];
        state.alarmScroll = 0;
      }
      break;
    }
    case PANEL.LOG: {
      /* カテゴリタブ（タグ 40-46） */
      if (tag >= 40 && tag <= 46) {
        const cat = LOG_CATS[tag - 40];
        if ((cat === 'settings' || cat === 'user') && state.role !== ROLE.ADMIN) return;
        state.logFilter = cat;
        state.logScroll = 0;
        return;
      }
      const ROW_H = 34;
      const y0 = HDR_H + 12 + 52 + 38 + 34;
      const filtLen = LOG_DATA.filter(l => state.logFilter === 'all' || l.cat === state.logFilter).length;
      const visible = Math.floor((H - 8 - y0) / ROW_H);
      if (tag === 2) { if (state.logScroll > 0) state.logScroll--; }
      if (tag === 4) { if (state.logScroll + visible < filtLen) state.logScroll++; }
      /* FEED: カテゴリタブを順送り（Admin は全7タブ、Operator は5タブまで） */
      if (tag === 11) {
        const maxCat = state.role === ROLE.ADMIN ? LOG_CATS.length : LOG_CATS.length - 2;
        const idx = LOG_CATS.indexOf(state.logFilter);
        state.logFilter = LOG_CATS[(idx + 1) % maxCat];
        state.logScroll = 0;
      }
      break;
    }
    case PANEL.SETTINGS: {
      const p = state.settingsParams;
      if (!state.settingsEditing) {
        if (tag === 2) state.settingsCursor = (state.settingsCursor - 1 + 4) % 4;
        if (tag === 4) state.settingsCursor = (state.settingsCursor + 1) % 4;
        if (tag === 3) state.settingsEditing = true;
        if (tag === 11 && state.settingsChanged) {
          state.settingsChanged = false;
          showToast('Settings saved', now);
          addLog('settings', 'Settings saved: MaxRPM=' + p.maxRpm + ' MinRPM=' + p.minRpm + ' Tool=T0' + p.toolNo);
        }
      } else {
        /* + ボタン (R1) */
        if (tag === 11) {
          if (state.settingsCursor === 0) p.maxRpm = Math.min(3000, p.maxRpm + 100);
          if (state.settingsCursor === 1) p.minRpm = Math.min(p.maxRpm - 100, p.minRpm + 100);
          if (state.settingsCursor === 2) {
            p.feedPattern = (p.feedPattern + 1) % 2;
            const maxIdx = FEED_PATTERNS[p.feedPattern].length - 1;
            if (state.feedIdx > maxIdx) state.feedIdx = maxIdx;
          }
          if (state.settingsCursor === 3) p.toolNo = Math.min(5, p.toolNo + 1);
          state.settingsChanged = true;
        }
        /* - ボタン (R2) */
        if (tag === 12) {
          if (state.settingsCursor === 0) p.maxRpm = Math.max(p.minRpm + 100, p.maxRpm - 100);
          if (state.settingsCursor === 1) p.minRpm = Math.max(0, p.minRpm - 100);
          if (state.settingsCursor === 2) {
            p.feedPattern = (p.feedPattern + 1) % 2;
            const maxIdx = FEED_PATTERNS[p.feedPattern].length - 1;
            if (state.feedIdx > maxIdx) state.feedIdx = maxIdx;
          }
          if (state.settingsCursor === 3) p.toolNo = Math.max(1, p.toolNo - 1);
          state.settingsChanged = true;
        }
        /* OK (R3) または 決定 (L3) で編集終了 */
        if (tag === 13 || tag === 3) state.settingsEditing = false;
      }
      break;
    }
    case PANEL.USERS: {
      if (tag === 2) state.userCursor = (state.userCursor - 1 + USER_DATA.length) % USER_DATA.length;
      if (tag === 4) state.userCursor = (state.userCursor + 1) % USER_DATA.length;
      const u = USER_DATA[state.userCursor];
      if (tag === 3 && u.role !== 'Admin') {
        u.active = !u.active;
        const msg = u.name + ': ' + (u.active ? 'Active' : 'Inactive');
        showToast(msg, now);
        addLog('user', 'User ' + msg);
      }
      if (tag === 11 && u.role !== 'Admin' && !u.active) {
        u.active = true;
        showToast(u.name + ' -> Active', now);
        addLog('user', 'User ' + u.name + ' set Active');
      }
      if (tag === 12 && u.role !== 'Admin' && u.active) {
        u.active = false;
        showToast(u.name + ' -> Inactive', now);
        addLog('user', 'User ' + u.name + ' set Inactive');
      }
      break;
    }
    case PANEL.TOOL_LIFE: {
      const tLen = state.tools.length;
      /* L2=UP */
      if (tag === 2) {
        if (state.toolCursor > 0) {
          state.toolCursor--;
          if (state.toolCursor < state.toolScroll) state.toolScroll--;
        }
      }
      /* L4=DN */
      if (tag === 4) {
        if (state.toolCursor < tLen - 1) {
          state.toolCursor++;
        }
      }
      /* R1=RST (Admin only) */
      if (tag === 11 && state.role === ROLE.ADMIN) {
        const t = state.tools[state.toolCursor];
        t.usage = 0;
        showToast('Tool ' + t.number + ' reset', now);
        addLog('operation', 'Tool life reset: ' + t.number + ' ' + t.name);
      }
      break;
    }
    case PANEL.COORDINATE:
      /* ボタンなし */
      break;
    case PANEL.MAINTENANCE: {
      const mLen = state.maintItems.length;
      /* L2=UP */
      if (tag === 2) {
        if (state.maintCursor > 0) {
          state.maintCursor--;
          if (state.maintCursor < state.maintScroll) state.maintScroll--;
        }
      }
      /* L4=DN */
      if (tag === 4) {
        if (state.maintCursor < mLen - 1) {
          state.maintCursor++;
        }
      }
      /* R1=DONE (Admin only) */
      if (tag === 11 && state.role === ROLE.ADMIN) {
        const m = state.maintItems[state.maintCursor];
        m.lastDone = state.rtcYear + '-' + p2(state.rtcMon) + '-' + p2(state.rtcDay);
        m.daysRem  = m.interval;
        showToast(m.name + ': Done', now);
        addLog('operation', 'Maintenance done: ' + m.name);
      }
      break;
    }
    case PANEL.PRODUCTION:
      /* R1: 期間サイクル */
      if (tag === 11) {
        state.prodPeriod = (state.prodPeriod + 1) % 3;
      }
      break;
  }
}

function startAuth(role, now) {
  state.authPending = role; state.authStart = now; state.screen = SCREEN.AUTH;
}

canvas.addEventListener('click', e => {
  const r   = canvas.getBoundingClientRect();
  const scx = W / r.width;
  const x   = Math.floor((e.clientX - r.left) * scx);
  const y   = Math.floor((e.clientY - r.top)  * scx);
  const tag = getTag(x, y);
  if (tag) handleTag(tag, performance.now());
});

/* ═══════════════════════════════════════════════
   ループ
═══════════════════════════════════════════════ */
function p2(n) { return String(n).padStart(2, '0'); }

function loop(now) {
  update(now);
  render(now);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
